name: Node CI
# test 2
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Install dependencies
      run: |
        if [ -f package.json ]; then npm install; else echo "No package.json"; fi

    - name: Run check
      run: node -e "console.log('CI Passed ✅')"
